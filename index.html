<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AB RENOV — Suivi Chantiers</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Raleway:wght@400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --navy:#162D49;
  --beige:#F3EAE2;--beige3:#ede4db;
  --violet:#A4A0C3;--violet-dark:#7a769e;
  --green:#3d9e70;--green2:rgba(61,158,112,0.12);
  --red:#b84a47;
  --text:#162D49;--muted:rgba(22,45,73,0.5);--dim:rgba(22,45,73,0.3);
  --border:rgba(22,45,73,0.1);--border2:rgba(22,45,73,0.16);
  --bg:#F3EAE2;
  --radius:12px;--radius-lg:20px;
  --font:'Raleway',sans-serif;--serif:'Cormorant Garamond',serif;--mono:'DM Mono',monospace;
  --hh:68px;
  --shadow-sm:0 1px 3px rgba(22,45,73,0.06),0 1px 8px rgba(22,45,73,0.04);
  --shadow-md:0 4px 16px rgba(22,45,73,0.1),0 1px 4px rgba(22,45,73,0.06);
  --shadow-lg:0 12px 40px rgba(22,45,73,0.14),0 2px 8px rgba(22,45,73,0.06);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
.hidden{display:none!important}
.header{position:sticky;top:0;z-index:100;height:var(--hh);background:var(--navy);border-bottom:1px solid rgba(243,234,226,0.08)}
.header::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(164,160,195,0.1),transparent 60%);pointer-events:none}
.header-inner{max-width:880px;margin:0 auto;height:100%;display:flex;align-items:center;justify-content:space-between;padding:0 20px;position:relative;z-index:1}
.header-brand{display:flex;align-items:center;gap:14px}
.brand-logo{width:42px;height:42px;background:var(--beige);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 12px rgba(0,0,0,0.2),inset 0 1px 0 rgba(255,255,255,0.5)}
.brand-logo span{font-family:var(--serif);font-size:19px;font-weight:700;color:var(--navy);letter-spacing:-1px;line-height:1;font-style:italic}
.brand-name{font-size:16px;font-weight:900;letter-spacing:3px;text-transform:uppercase;color:#fff}
.brand-sub{font-size:9px;color:rgba(243,234,226,0.5);letter-spacing:2px;text-transform:uppercase;font-weight:600;margin-top:2px}
.btn-refresh{width:36px;height:36px;border-radius:8px;border:1px solid rgba(243,234,226,0.15);background:rgba(243,234,226,0.06);color:rgba(243,234,226,0.5);font-size:17px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s}
.btn-refresh:hover{color:var(--beige);border-color:rgba(243,234,226,0.3);transform:rotate(40deg)}
.stats-band{background:var(--navy);border-bottom:1px solid rgba(243,234,226,0.08);padding:11px 20px;display:flex;align-items:center;justify-content:center;gap:6px;flex-wrap:wrap}
.stat-card{display:flex;align-items:center;gap:8px;padding:7px 14px;background:rgba(243,234,226,0.18);border:1px solid rgba(243,234,226,0.25);border-radius:99px}
.stat-card.hl{background:rgba(243,234,226,0.18);border-color:rgba(243,234,226,0.25)}
.stat-label{font-size:9px;color:rgba(243,234,226,0.45);text-transform:uppercase;letter-spacing:1.2px;font-weight:700;white-space:nowrap}
.stat-sep{color:rgba(243,234,226,0.25);font-size:11px;line-height:1}
.stat-value{font-family:var(--serif);font-size:15px;font-weight:600;font-style:italic;color:#fff;white-space:nowrap}
.tabs{display:flex;background:var(--beige3);border-bottom:1px solid var(--border2);position:sticky;top:var(--hh);z-index:90}
.tab{flex:1;padding:14px 6px;background:transparent;border:none;color:var(--muted);font-family:var(--font);font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;border-bottom:2px solid transparent;transition:all .2s}
.tab.active{color:var(--navy);border-bottom-color:var(--navy);background:rgba(22,45,73,0.03)}
.tab-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.dot-v{background:var(--violet)}.dot-g{background:var(--green)}
.tab-count{background:rgba(22,45,73,0.08);color:var(--muted);font-size:9px;padding:2px 7px;border-radius:99px;min-width:20px;text-align:center;font-family:var(--mono)}
.tab.active .tab-count{background:var(--navy);color:#fff}
.main-content{max-width:880px;margin:0 auto;padding:0 0 100px;position:relative;z-index:1}
.tab-content{display:none}.tab-content.active{display:block}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:22px 18px 16px;gap:12px;flex-wrap:wrap}
.section-header h2{font-family:var(--serif);font-size:24px;font-weight:600;font-style:italic;color:var(--navy)}
.filter-row{display:flex;gap:8px;flex-wrap:wrap}
.filter-row select,#stats-annee{padding:8px 14px;background:#fff;border:1px solid var(--border2);border-radius:8px;color:var(--text);font-family:var(--font);font-size:11px;font-weight:600;cursor:pointer;outline:none;box-shadow:var(--shadow-sm);transition:border-color .2s}
.filter-row select:hover,#stats-annee:hover{border-color:var(--violet)}
.info-banner{margin:0 18px 16px;padding:12px 16px;background:rgba(164,160,195,0.11);border-radius:var(--radius);font-size:11.5px;color:var(--violet-dark);border-left:3px solid var(--violet);font-weight:600;line-height:1.5}
.btn-add{padding:10px 20px;background:var(--navy);color:#fff;border:none;border-radius:10px;font-family:var(--font);font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .2s;box-shadow:0 4px 14px rgba(22,45,73,0.22);position:relative;overflow:hidden}
.btn-add::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.08),transparent);pointer-events:none}
.btn-add:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(22,45,73,0.28)}
.btn-add:active{transform:none}
.chantier-list{padding:0 18px}
.chantier-card{background:#fff;border:1px solid var(--border2);border-radius:var(--radius);padding:13px 14px 13px 20px;margin-bottom:9px;position:relative;animation:fadeUp .3s ease both;transition:all .2s;box-shadow:var(--shadow-sm)}
.chantier-card:hover{border-color:rgba(22,45,73,0.22);transform:translateY(-2px);box-shadow:var(--shadow-md)}
.chantier-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;border-radius:12px 0 0 12px}
.chantier-card.previsionnel::before{background:linear-gradient(180deg,var(--violet),rgba(164,160,195,0.4))}
.chantier-card.facture::before{background:linear-gradient(180deg,var(--green),rgba(61,158,112,0.3))}
.chantier-card.zero{opacity:.6}
.card-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
.card-left{flex:1;min-width:0;overflow:hidden}
.card-right{display:flex;align-items:center;gap:10px;flex-shrink:0}
.card-meta{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
.card-client{font-size:13px;font-weight:800;letter-spacing:.8px;color:var(--navy);text-transform:uppercase;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-montant{font-family:var(--serif);font-size:20px;font-weight:700;font-style:italic;color:var(--navy);white-space:nowrap}
.card-montant.gris{font-size:13px;font-family:var(--font);color:var(--dim);font-style:normal;font-weight:500}
.chantier-card.facture .card-montant{color:var(--green)}
.card-tag{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:6px;font-size:10px;font-weight:700;background:rgba(22,45,73,0.05);color:var(--muted);border:1px solid var(--border);letter-spacing:.5px;text-transform:uppercase}
.card-tag.ftag{background:var(--green2);color:var(--green);border-color:rgba(61,158,112,.2);font-family:var(--mono);font-size:9.5px;letter-spacing:0;text-transform:none}
.card-tag.dtag{background:rgba(164,160,195,0.1);color:var(--violet-dark);border-color:rgba(164,160,195,.28)}
.card-actions{display:flex;gap:5px;align-items:center}
.btn-edit,.btn-del{width:28px;height:28px;border-radius:7px;cursor:pointer;border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .15s;padding:0;background:transparent}
.btn-edit{color:var(--dim)}.btn-edit:hover{background:rgba(22,45,73,.06);color:var(--navy);border-color:rgba(22,45,73,.2)}
.btn-del{color:var(--dim)}.btn-del:hover{background:rgba(184,74,71,.08);color:var(--red);border-color:rgba(184,74,71,.22)}
.empty-state{text-align:center;padding:60px 24px;color:var(--muted)}
.empty-icon{font-size:32px;margin-bottom:14px;opacity:.28}
.empty-state p{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase}
.loading{text-align:center;padding:48px;color:var(--muted);font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
#stats-content{padding:0 18px 18px}
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:28px}
.stat-big{background:#fff;border:1px solid var(--border2);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden}
.stat-big::after{content:'';position:absolute;bottom:-16px;right:-16px;width:64px;height:64px;border-radius:50%;background:rgba(22,45,73,0.03);pointer-events:none}
.stat-big-label{font-size:9px;text-transform:uppercase;letter-spacing:1.5px;font-weight:700;color:var(--muted);margin-bottom:8px}
.stat-big-value{font-family:var(--serif);font-size:28px;font-weight:600;font-style:italic;color:var(--navy)}
.stat-big-value.v{color:var(--violet-dark)}.stat-big-value.g{color:var(--green)}
.stitle{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin:28px 0 14px;display:flex;align-items:center;gap:12px}
.stitle::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--border2),transparent)}
.month-row{display:flex;align-items:center;padding:11px 16px;background:#fff;border:1px solid var(--border2);border-radius:var(--radius);margin-bottom:6px;gap:14px;box-shadow:var(--shadow-sm);transition:transform .15s,box-shadow .15s}
.month-row:hover{transform:translateX(3px);box-shadow:var(--shadow-md)}
.month-name{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;min-width:80px;color:var(--navy)}
.month-bar-wrap{flex:1;height:3px;background:rgba(22,45,73,.06);border-radius:99px;overflow:hidden}
.month-bar{height:100%;background:linear-gradient(90deg,var(--green),rgba(61,158,112,0.5));border-radius:99px;transition:width .7s cubic-bezier(.4,0,.2,1)}
.month-amount{font-family:var(--serif);font-size:16px;font-weight:600;font-style:italic;color:var(--green);min-width:90px;text-align:right}
.month-count{font-size:10px;color:var(--muted);min-width:60px;text-align:right;font-weight:600;font-family:var(--mono)}
.year-row{display:flex;align-items:center;justify-content:space-between;padding:18px;background:#fff;border:1px solid var(--border2);border-radius:var(--radius);margin-bottom:8px;box-shadow:var(--shadow-sm)}
.year-label{font-family:var(--serif);font-size:26px;font-weight:600;font-style:italic;color:var(--navy)}
.year-amount{font-family:var(--serif);font-size:20px;font-weight:600;font-style:italic;color:var(--violet-dark)}
.year-count{font-size:10px;color:var(--muted);font-weight:600;font-family:var(--mono)}
.modal-overlay{position:fixed;inset:0;background:rgba(22,45,73,.4);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fadeIn .2s ease;backdrop-filter:blur(10px)}
@media(min-width:600px){.modal-overlay{align-items:center;padding:24px}}
.modal-box{width:100%;max-width:500px;background:var(--beige);border-radius:var(--radius-lg) var(--radius-lg) 0 0;border:1px solid var(--border2);border-bottom:none;animation:slideUp .3s cubic-bezier(.16,1,.3,1);max-height:92vh;overflow-y:auto;box-shadow:var(--shadow-lg)}
@media(min-width:600px){.modal-box{border-radius:var(--radius-lg);border:1px solid var(--border2)}}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:24px 22px 0;margin-bottom:22px}
.modal-header h3{font-family:var(--serif);font-size:22px;font-weight:600;font-style:italic;color:var(--navy)}
.modal-close{width:32px;height:32px;border-radius:8px;border:1px solid var(--border2);background:rgba(22,45,73,0.05);color:var(--muted);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.modal-close:hover{background:rgba(22,45,73,0.1);color:var(--navy)}
.modal-body{padding:0 22px 26px}
.field-group{margin-bottom:18px}
.field-group label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:8px}
.field-hint{font-size:10px;font-weight:400;color:var(--dim);text-transform:none;letter-spacing:0}
.field-group input{width:100%;padding:13px 16px;background:#fff;border:1.5px solid var(--border2);border-radius:10px;color:var(--navy);font-family:var(--font);font-size:14px;font-weight:600;outline:none;transition:all .2s;box-shadow:var(--shadow-sm)}
.field-group input:focus{border-color:var(--navy);box-shadow:0 0 0 3px rgba(22,45,73,0.07)}
.field-group input::placeholder{color:var(--dim);font-weight:400}
input[type="date"]{color-scheme:light}
.modal-actions{display:flex;gap:10px;margin-top:26px}
.btn-cancel,.btn-save{flex:1;padding:15px;border-radius:10px;font-family:var(--font);font-size:11px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:all .2s;border:none}
.btn-cancel{background:rgba(22,45,73,.07);color:var(--muted);border:1px solid var(--border2)}
.btn-cancel:hover{background:rgba(22,45,73,.12)}
.btn-save{background:var(--navy);color:#fff;box-shadow:0 4px 14px rgba(22,45,73,0.22)}
.btn-save:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(22,45,73,0.28)}
.btn-save:active,.btn-cancel:active{transform:none;opacity:.8}
.status-bar{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);padding:13px 26px;border-radius:99px;font-size:11px;font-weight:700;z-index:300;animation:fadeUp .3s cubic-bezier(.16,1,.3,1);white-space:nowrap;box-shadow:var(--shadow-lg);letter-spacing:1px;text-transform:uppercase}
.status-bar.success{background:var(--green);color:#fff}
.status-bar.error{background:var(--red);color:#fff}
.status-bar.info{background:var(--navy);color:var(--beige)}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px) translateX(-50%)}to{opacity:1;transform:translateY(0) translateX(-50%)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(50px);opacity:0}to{transform:translateY(0);opacity:1}}
.chantier-card:nth-child(1){animation-delay:.04s}
.chantier-card:nth-child(2){animation-delay:.09s}
.chantier-card:nth-child(3){animation-delay:.14s}
.chantier-card:nth-child(4){animation-delay:.19s}
.chantier-card:nth-child(5){animation-delay:.24s}
.chantier-card:nth-child(6){animation-delay:.28s}
@media(min-width:600px){
  .stat-value{font-size:22px}.tab{font-size:11px;padding:15px 12px}
  .card-client{font-size:14px}.card-montant{font-size:22px}
  .stats-grid{grid-template-columns:repeat(3,1fr)}
}
@media(min-width:880px){
  .header-inner,.stats-band,.tabs,.main-content{max-width:880px;margin-left:auto;margin-right:auto}
}
</style>

</head>
<body>

<div id="app">
  <header class="header">
    <div class="header-inner">
      <div class="header-brand">
        <div class="brand-logo"><span>AB</span></div>
        <div>
          <div class="brand-name">AB RENOV</div>
          <div class="brand-sub">Aménagement &amp; Rénovation</div>
        </div>
      </div>
      <button class="btn-refresh" onclick="loadData()" title="Actualiser">↻</button>
    </div>
  </header>

  <section class="stats-band">
    <div class="stat-card"><span class="stat-label">Prévisionnel</span><span class="stat-sep">·</span><span class="stat-value" id="stat-prev">—</span></div>
    <div class="stat-card hl"><span class="stat-label">Facturé <span id="stat-annee-label">2026</span></span><span class="stat-sep">·</span><span class="stat-value" id="stat-annee">—</span></div>
    <div class="stat-card"><span class="stat-label">Ce mois</span><span class="stat-sep">·</span><span class="stat-value" id="stat-mois">—</span></div>
  </section>

  <nav class="tabs">
    <button class="tab active" data-tab="previsionnel" onclick="switchTab('previsionnel')">
      <span class="tab-dot dot-v"></span>Prévisionnels<span class="tab-count" id="count-prev">0</span>
    </button>
    <button class="tab" data-tab="facture" onclick="switchTab('facture')">
      <span class="tab-dot dot-g"></span>Facturés<span class="tab-count" id="count-fact">0</span>
    </button>
    <button class="tab" data-tab="stats" onclick="switchTab('stats')">▦ Stats</button>
  </nav>

  <main class="main-content">

    <div id="tab-previsionnel" class="tab-content active">
      <div class="section-header">
        <h2>Chantiers prévisionnels</h2>
        <button class="btn-add" onclick="openModal('add')">+ Ajouter</button>
      </div>
      <div class="info-banner">Saisir un numéro de facture fait basculer le chantier en Facturés automatiquement.</div>
      <div id="list-previsionnel" class="chantier-list"><div class="loading">Chargement…</div></div>
    </div>

    <div id="tab-facture" class="tab-content">
      <div class="section-header">
        <h2>Chantiers facturés</h2>
        <div class="filter-row">
          <select id="filter-annee" onchange="renderFactures()"><option value="">Toutes années</option></select>
          <select id="filter-mois" onchange="renderFactures()">
            <option value="">Tous mois</option>
            <option value="1">Janvier</option><option value="2">Février</option><option value="3">Mars</option>
            <option value="4">Avril</option><option value="5">Mai</option><option value="6">Juin</option>
            <option value="7">Juillet</option><option value="8">Août</option><option value="9">Septembre</option>
            <option value="10">Octobre</option><option value="11">Novembre</option><option value="12">Décembre</option>
          </select>
        </div>
      </div>
      <div id="list-facture" class="chantier-list"><div class="loading">Chargement…</div></div>
    </div>

    <div id="tab-stats" class="tab-content">
      <div class="section-header">
        <h2>Statistiques</h2>
        <select id="stats-annee" onchange="renderStats()"><option value="">Toutes années</option></select>
      </div>
      <div id="stats-content"><div class="loading">Chargement…</div></div>
    </div>

  </main>
  <div id="status-bar" class="status-bar hidden"></div>
</div>

<!-- MODAL -->
<div id="modal-overlay" class="modal-overlay hidden" onclick="closeModal(event)">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-header">
      <h3 id="modal-title">Nouveau chantier</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="field-id"/>
      <div class="field-group"><label>Client / Référence *</label><input type="text" id="field-client" placeholder="Ex : M. Dupont — Cuisine"/></div>
      <div class="field-group"><label>Montant (€)</label><input type="number" id="field-montant" placeholder="Ex : 2450" min="0" step="0.01"/></div>
      <div class="field-group"><label>Information libre</label><input type="text" id="field-info" placeholder="Ex : Semaine 42"/></div>
      <div class="field-group"><label>Numéro de facture <span class="field-hint">(vide = prévisionnel)</span></label><input type="text" id="field-facture" placeholder="Ex : FAC-2026-018"/></div>
      <div class="field-group"><label>Date</label><input type="date" id="field-date"/></div>
      <div class="modal-actions">
        <button class="btn-cancel" onclick="closeModal()">Annuler</button>
        <button class="btn-save" onclick="saveChantier()">Enregistrer</button>
      </div>
    </div>
  </div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbyuFLgzcyv8Hj7eWJN5RJc90KsothvsN9Mo8rX5Pt74n8l0br4aO_9R6EUyDq5pH6eYZg/exec';
let allData = [];

window.addEventListener('DOMContentLoaded', () => loadData());

async function loadData() {
  showStatus('Chargement…','info');
  try {
    const res  = await fetch(API_URL + '?action=getAll', { redirect:'follow' });
    const text = await res.text();
    const json = JSON.parse(text);
    if (json.status !== 'ok') throw new Error(json.message);
    allData = json.data || [];
    renderAll();
    hideStatus();
  } catch(err) {
    console.error(err);
    showStatus('❌ Erreur de chargement','error',5000);
    allData = [];
    renderAll();
  }
}

function renderAll() {
  renderPrevisionnels();
  renderFactures();
  renderStats();
  renderBand();
  updateFilters();
}

function renderPrevisionnels() {
  let list = allData.filter(c => c.statut === 'previsionnel');
  list.sort((a,b) => {
    const ma = Number(a.montant||0), mb = Number(b.montant||0);
    if(ma===0 && mb>0) return 1;
    if(mb===0 && ma>0) return -1;
    return mb - ma;
  });
  document.getElementById('count-prev').textContent = list.length;
  const el = document.getElementById('list-previsionnel');
  if(!list.length){ el.innerHTML='<div class="empty-state"><div class="empty-icon">📋</div><p>Aucun chantier prévisionnel</p></div>'; return; }
  el.innerHTML = list.map(c => {
    const z = Number(c.montant||0)===0;
    return `<div class="chantier-card previsionnel${z?' zero':''}">
      <div class="card-row">
        <div class="card-left">
          <div class="card-client">${esc(c.client)}</div>
          <div class="card-meta">
            ${c.information?`<span class="card-tag">${esc(c.information)}</span>`:''}
            <span class="card-tag dtag">${fmtDate(c.date_creation)}</span>
          </div>
        </div>
        <div class="card-right">
          <div class="card-montant${z?' gris':''}">${z?'À définir':fmt(c.montant)}</div>
          <div class="card-actions">
            <button class="btn-edit" onclick="openModal('edit','${c.id}')" title="Modifier">✏️</button>
            <button class="btn-del" onclick="del('${c.id}')" title="Supprimer">✕</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderFactures() {
  let list = allData.filter(c => c.statut === 'facture');
  const a = document.getElementById('filter-annee').value;
  const m = document.getElementById('filter-mois').value;
  if(a) list = list.filter(c => String(c.annee)===a);
  if(m) list = list.filter(c => String(c.mois)===m);
  list.sort((a,b) => new Date(b.date_creation) - new Date(a.date_creation));
  document.getElementById('count-fact').textContent = allData.filter(c=>c.statut==='facture').length;
  const el = document.getElementById('list-facture');
  if(!list.length){ el.innerHTML='<div class="empty-state"><div class="empty-icon">🧾</div><p>Aucun chantier facturé</p></div>'; return; }
  el.innerHTML = list.map(c => `<div class="chantier-card facture">
    <div class="card-row">
      <div class="card-left">
        <div class="card-client">${esc(c.client)}</div>
        <div class="card-meta">
          <span class="card-tag ftag">${esc(c.facture)}</span>
          <span class="card-tag dtag">${fmtDate(c.date_creation)}</span>
          ${c.information?`<span class="card-tag">${esc(c.information)}</span>`:''}
          <span class="card-tag">${nomMois(c.mois)} ${c.annee}</span>
        </div>
      </div>
      <div class="card-right">
        <div class="card-montant">${fmt(c.montant)}</div>
        <div class="card-actions">
          <button class="btn-edit" onclick="openModal('edit','${c.id}')" title="Modifier">✏️</button>
          <button class="btn-del" onclick="del('${c.id}')" title="Supprimer">✕</button>
        </div>
      </div>
    </div>
  </div>`).join('');
}

function renderStats() {
  const annee = document.getElementById('stats-annee').value ? Number(document.getElementById('stats-annee').value) : null;
  let fac = allData.filter(c=>c.statut==='facture');
  if(annee) fac = fac.filter(c=>Number(c.annee)===annee);
  const totFac  = fac.reduce((s,c)=>s+Number(c.montant||0),0);
  const totPrev = allData.filter(c=>c.statut==='previsionnel').reduce((s,c)=>s+Number(c.montant||0),0);
  const parMois = {};
  for(let m=1;m<=12;m++) parMois[m]={total:0,count:0};
  fac.forEach(c=>{const m=Number(c.mois);if(m>=1&&m<=12){parMois[m].total+=Number(c.montant||0);parMois[m].count++;}});
  const maxM = Math.max(...Object.values(parMois).map(v=>v.total),1);
  const annees = {};
  allData.filter(c=>c.statut==='facture').forEach(c=>{const a=c.annee||'—';if(!annees[a])annees[a]={total:0,count:0};annees[a].total+=Number(c.montant||0);annees[a].count++;});
  document.getElementById('stats-content').innerHTML = `
    <div class="stats-grid">
      <div class="stat-big"><div class="stat-big-label">Prévisionnel en cours</div><div class="stat-big-value v">${fmt(totPrev)}</div></div>
      <div class="stat-big"><div class="stat-big-label">Facturé ${annee||'global'}</div><div class="stat-big-value g">${fmt(totFac)}</div></div>
      <div class="stat-big"><div class="stat-big-label">Chantiers facturés</div><div class="stat-big-value">${fac.length}</div></div>
    </div>
    <div class="stitle">Par mois ${annee||''}</div>
    ${Object.entries(parMois).map(([m,d])=>{
      const pct=Math.round((d.total/maxM)*100);
      return `<div class="month-row"><div class="month-name">${nomMois(m)}</div><div class="month-bar-wrap"><div class="month-bar" style="width:${pct}%"></div></div><div class="month-count">${d.count} chantier${d.count>1?'s':''}</div><div class="month-amount">${d.total>0?fmt(d.total):'—'}</div></div>`;
    }).join('')}
    <div class="stitle" style="margin-top:32px">Par année</div>
    ${Object.entries(annees).sort((a,b)=>b[0]-a[0]).map(([a,d])=>`<div class="year-row"><div class="year-label">${a}</div><div class="year-count">${d.count} chantier${d.count>1?'s':''}</div><div class="year-amount">${fmt(d.total)}</div></div>`).join('')||'<div class="empty-state"><p>Aucune donnée</p></div>'}`;
}

function renderBand() {
  const now=new Date(), a=now.getFullYear(), m=now.getMonth()+1;
  const totPrev  = allData.filter(c=>c.statut==='previsionnel').reduce((s,c)=>s+Number(c.montant||0),0);
  const totAnnee = allData.filter(c=>c.statut==='facture'&&Number(c.annee)===a).reduce((s,c)=>s+Number(c.montant||0),0);
  const totMois  = allData.filter(c=>c.statut==='facture'&&Number(c.annee)===a&&Number(c.mois)===m).reduce((s,c)=>s+Number(c.montant||0),0);
  document.getElementById('stat-prev').textContent        = fmt(totPrev);
  document.getElementById('stat-annee').textContent       = fmt(totAnnee);
  document.getElementById('stat-annee-label').textContent = a;
  document.getElementById('stat-mois').textContent        = fmt(totMois);
}

function updateFilters() {
  const annees = [...new Set(allData.filter(c=>c.annee).map(c=>String(c.annee)))].sort((a,b)=>b-a);
  ['filter-annee','stats-annee'].forEach(id=>{
    const sel=document.getElementById(id), val=sel.value;
    sel.innerHTML='<option value="">Toutes années</option>'+annees.map(a=>`<option value="${a}">${a}</option>`).join('');
    sel.value=val;
  });
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));
  document.querySelectorAll('.tab-content').forEach(e=>e.classList.toggle('active',e.id===`tab-${tab}`));
}

function openModal(mode, id) {
  document.getElementById('modal-overlay').classList.remove('hidden');
  if(mode==='add'){
    document.getElementById('modal-title').textContent='Nouveau chantier';
    ['field-id','field-client','field-montant','field-info','field-facture','field-date'].forEach(f=>document.getElementById(f).value='');
  } else {
    const c=allData.find(x=>x.id===id); if(!c) return;
    document.getElementById('modal-title').textContent='Modifier le chantier';
    document.getElementById('field-id').value      = c.id;
    document.getElementById('field-client').value  = c.client||'';
    document.getElementById('field-montant').value = c.montant||'';
    document.getElementById('field-info').value    = c.information||'';
    document.getElementById('field-facture').value = c.facture||'';
    document.getElementById('field-date').value    = c.date_creation ? String(c.date_creation).split('T')[0] : '';
  }
}

function closeModal(evt) {
  if(evt&&evt.target!==document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.add('hidden');
}

async function saveChantier() {
  const id      = document.getElementById('field-id').value.trim();
  const client  = document.getElementById('field-client').value.trim();
  const montant = document.getElementById('field-montant').value.trim();
  if(!client){ alert('Le nom du client est obligatoire.'); return; }
  const payload = {
    action: id?'update':'add', client,
    montant: montant?Number(montant):0,
    information: document.getElementById('field-info').value.trim(),
    facture:     document.getElementById('field-facture').value.trim(),
    date_creation: document.getElementById('field-date').value || new Date().toISOString().split('T')[0]
  };
  if(id) payload.id=id;
  try {
    const res  = await fetch(API_URL,{method:'POST',body:JSON.stringify(payload),redirect:'follow'});
    const json = JSON.parse(await res.text());
    if(json.status!=='ok') throw new Error(json.message);
    closeModal();
    showStatus('✅ Chantier enregistré !','success',3000);
    await loadData();
  } catch(err){ console.error(err); showStatus('❌ Erreur enregistrement','error',4000); }
}

async function del(id) {
  const c=allData.find(x=>x.id===id);
  if(!c||!confirm(`Supprimer "${c.client}" ?`)) return;
  try {
    const res  = await fetch(API_URL,{method:'POST',body:JSON.stringify({action:'delete',id}),redirect:'follow'});
    const json = JSON.parse(await res.text());
    if(json.status!=='ok') throw new Error(json.message);
    showStatus('Chantier supprimé.','success',3000);
    await loadData();
  } catch(err){ showStatus('❌ Erreur suppression','error',4000); }
}

function fmt(val) {
  const n=Number(val);
  if(isNaN(n)||val===''||val===null||val===undefined) return '—';
  return n.toLocaleString('fr-FR',{style:'currency',currency:'EUR',maximumFractionDigits:0});
}
function fmtDate(val) {
  if(!val) return '—';
  const d=new Date(val); if(isNaN(d)) return val;
  return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'});
}
function nomMois(n) {
  return ['','Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'][Number(n)]||'—';
}
function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
let stTimer=null;
function showStatus(msg,type='info',duration=0){
  const bar=document.getElementById('status-bar');
  bar.textContent=msg; bar.className=`status-bar ${type}`; bar.classList.remove('hidden');
  if(stTimer) clearTimeout(stTimer);
  if(duration>0) stTimer=setTimeout(hideStatus,duration);
}
function hideStatus(){ document.getElementById('status-bar').classList.add('hidden'); }
</script>
</body>
